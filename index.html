<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Sort Demo</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        input, button { padding: 6px; font-size: 16px; }
        #output { margin-top: 20px; white-space: pre-line; }
    </style>
</head>
<body>
    <h1>氣泡排序法 (Bubble Sort) 範例</h1>
    <p>請輸入用逗號分隔的數字：</p>
    <input type="text" id="numbers" placeholder="e.g. 5,3,8,1,2" size="40" />
    <button onclick="runBubbleSort()">排序</button>

    <div id="output"></div>

    <script>
        function bubbleSort(arr) {
            const n = arr.length;
            const steps = [];
            for (let i = 0; i < n - 1; i++) {
                for (let j = 0; j < n - 1 - i; j++) {
                    steps.push(`比較 arr[${j}]=${arr[j]} 和 arr[${j+1}]=${arr[j+1]}`);
                    if (arr[j] > arr[j+1]) {
                        [arr[j], arr[j+1]] = [arr[j+1], arr[j]];
                        steps.push(`交換 => ${arr.join(',')}`);
                    }
                }
            }
            return {sorted: arr, steps};
        }

        function runBubbleSort() {
            const input = document.getElementById('numbers').value;
            if (!input) {
                alert('請輸入數字！');
                return;
            }

            const arr = input.split(',').map(x => parseFloat(x.trim())).filter(x => !isNaN(x));
            const {sorted, steps} = bubbleSort(arr.slice());

            const out = document.getElementById('output');
            let html = `原始陣列: ${arr.join(',')}\n\n`;
            html += '步驟:\n';
            steps.forEach(s => html += s + '\n');
            html += `\n排序結果: ${sorted.join(',')}`;
            out.textContent = html;
        }
    </script>
</body>
</html>
